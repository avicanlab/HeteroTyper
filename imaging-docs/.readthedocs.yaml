# .readthedocs.yaml
# Read the Docs configuration file for the HeteroTyper Imaging Platform docs.
# This is a second Read the Docs project built from the same repository as the
# main HeteroTyper Pipeline docs (see /.readthedocs.yaml at the repo root).
# Read the Docs requires the file to be named exactly ".readthedocs.yaml", so
# this one lives in its own sub-folder instead. On the "HeteroTyper Imaging"
# project, set Settings > "Path for .readthedocs.yaml" to:
#   imaging-docs/.readthedocs.yaml
# Paths below are relative to this file's own location (imaging-docs/), not
# the repository root.
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"

sphinx:
  configuration: source/conf.py

python:
  install:
    - requirements: requirements.txt
