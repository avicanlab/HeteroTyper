# .readthedocs-imaging.yaml
# Read the Docs configuration file for the HeteroTyper Imaging Platform docs.
# This is a second Read the Docs project built from the same repository as the
# main HeteroTyper Pipeline docs (see .readthedocs.yaml). When creating that
# project on readthedocs.org, set "Configuration file" (Admin > Settings >
# Advanced Settings) to this file's path.
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"

sphinx:
  configuration: imaging-docs/source/conf.py

python:
  install:
    - requirements: imaging-docs/requirements.txt
